name: Lints
on:
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint
